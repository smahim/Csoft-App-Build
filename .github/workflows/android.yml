name: Build Android APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: setup java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: install cordova
        run: npm install -g cordova

      - name: build app
        run: |
          unzip My_Csoft_App.zip -d build_files
          cordova create project com.csoft.app Csoft
          cd project
          rm -rf www/*
          cp -r ../build_files/* www/
          cordova platform add android
          cordova build android --no-telemetry

      - name: upload
        uses: actions/upload-artifact@v3
        with:
          name: Csoft-APK
          path: project/platforms/android/app/build/outputs/apk/debug/app-debug.apk
