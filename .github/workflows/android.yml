name: Build Android APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Build Android
        run: |
          # সব ফাইল একবার দেখে নেওয়া (debug)
          ls -R
          
          # জিপ ফাইল আনজিপ করার চেষ্টা
          if [ -f "My_Csoft_App.zip" ]; then
            unzip My_Csoft_App.zip
          else
            echo "Error: My_Csoft_App.zip not found!"
            exit 1
          fi
          
          cordova create project com.csoft.app Csoft
          cd project
          rm -rf www/*
          
          # আপনার ফোল্ডার স্ট্রাকচার অনুযায়ী কপি
          if [ -d "../My_Csoft_App" ]; then
            cp -r ../My_Csoft_App/* www/
          else
            cp -r ../* www/ --exclude=project
          fi
          
          cordova platform add android
          cordova build android --no-telemetry

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: Csoft-APK
          path: project/platforms/android/app/build/outputs/apk/debug/app-debug.apk
