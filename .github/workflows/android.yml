name: Build Android APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Install Cordova
        run: npm install -g cordova
      - name: Build Android
        run: |
          unzip My_Csoft_App.zip -d www_content
          cordova create project com.csoft.app Csoft
          cd project
          rm -rf www/*
          cp -r ../www_content/* www/
          cordova platform add android
          cordova build android --no-telemetry
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: Csoft-APK
          path: project/platforms/android/app/build/outputs/apk/debug/app-debug.apk
